<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VICE CITY: TWO-WAY HIGHWAY</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px #f0f;
            z-index: 10;
            display: none;
        }

        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            backdrop-filter: grayscale(1) blur(5px);
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        #wasted.visible {
            opacity: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px #000;
            pointer-events: none;
            z-index: 5;
        }

        #stats-banner {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 40;
            pointer-events: none;
            padding: 0 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .stat-badge {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            transition: all 0.3s;
        }

        .stat-badge .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #0ff;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .stat-badge .value {
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            font-weight: 900;
        }

        /* Main Menu Styling */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: linear-gradient(135deg, rgba(10, 0, 20, 0.8), rgba(20, 0, 40, 0.8));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 30;
            backdrop-filter: blur(8px);
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            padding: 20px 10px;
        }

        #main-menu h1 {
            font-size: 5rem;
            text-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
            margin-bottom: 5px;
            font-style: italic;
        }

        #main-menu h2 {
            font-size: 1.5rem;
            color: #ccc;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #f0f;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            max-width: 90vw;
        }

        .model-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            max-width: 800px;
            overflow-y: auto;
            max-height: 300px;
            padding: 15px 5px;
            /* Scrollbar for shop */
            scrollbar-width: thin;
            scrollbar-color: #0ff transparent;
        }

        .model-picker::-webkit-scrollbar {
            width: 6px;
        }
        .model-picker::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 4px;
        }

        .color-picker {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .model-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #555;
            padding: 10px 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
            gap: 8px;
        }

        .model-btn:hover:not(.locked) {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .model-btn.selected {
            border-color: #0ff;
            box-shadow: 0 0 20px #0ff;
            color: #0ff;
        }

        .model-btn .price {
            font-size: 0.9rem;
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }

        .model-btn.locked {
            border-color: #333;
            color: #777;
            background: rgba(0,0,0,0.5);
        }

        .model-btn.locked .price {
            color: #f55;
            text-shadow: none;
        }

        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .color-btn.selected {
            box-shadow: 0 0 20px #fff;
            transform: scale(1.2);
            border-color: #fff;
        }

        .start-btn {
            background: linear-gradient(45deg, #f0f, #0ff);
            color: #000;
            border: none;
            padding: 18px 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 40px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            color: #fff;
            background: linear-gradient(45deg, #0ff, #f0f);
        }

        /* New Menu Views */
        .menu-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .garage-btn, .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid #f0f;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .garage-btn:hover, .back-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 15px #f0f;
        }

        .main-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        /* --- MOBILE TOUCH CONTROLS --- */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 15;
            pointer-events: none;
        }

        .touch-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.1s;
        }

        .touch-btn:active, .touch-btn.pressed {
            background: rgba(0, 255, 255, 0.35);
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        #btn-gas   { bottom: 80px; right: 30px; }
        #btn-brake { bottom: 10px; right: 30px; }
        #btn-left  { bottom: 40px; left: 30px; }
        #btn-right { bottom: 40px; left: 120px; }
        #btn-up    { bottom: 150px; right: 30px; display: none; }
        #btn-down  { bottom: 150px; left: 75px; display: none; }

        /* --- FULLSCREEN BUTTON --- */
        #fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 50;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            border-color: #0ff;
        }

        /* --- ROTATE DEVICE OVERLAY --- */
        #rotate-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            gap: 20px;
        }
        #rotate-overlay .rotate-icon {
            font-size: 60px;
            animation: rotateAnim 2s ease-in-out infinite;
        }
        @keyframes rotateAnim {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media (max-width: 768px) {
            .start-btn { padding: 12px 35px; font-size: 1.2rem; }
            #stats-banner { top: 15px; gap: 10px; }
            .stat-badge { padding: 5px 12px; min-width: 80px; }
            .stat-badge .value { font-size: 16px; }
            .stat-badge .label { font-size: 8px; letter-spacing: 1px; }
            #ui { font-size: 13px; }
            #wasted h1 { font-size: 4rem !important; }
        }

        /* Landscape mobile: compact layout */
        @media (orientation: landscape) and (max-height: 600px) {
            #main-menu { 
                justify-content: center; 
                padding: 10px;
            }
            #main-menu h1 { 
                font-size: clamp(1.8rem, 12vh, 3.5rem); 
                margin: 0;
                line-height: 1;
            }
            #main-menu h2 { font-size: 1rem; margin: 5px 0; }
            
            .main-actions {
                flex-direction: row;
                gap: 15px;
                margin-top: 10px;
            }
            
            #garage-category-selection {
                margin: 15px 0 !important;
                gap: 15px !important;
            }
            #garage-category-selection .start-btn {
                padding: 15px 30px !important;
                font-size: 1.1rem !important;
            }

            .options-container { 
                padding: 10px; 
                margin-bottom: 0px; 
                max-width: 95vw;
                flex-direction: column;
                gap: 10px;
                align-items: center;
                overflow-y: auto;
            }
            .options-container h3 { font-size: 0.9rem; margin: 5px 0; }
            
            .model-picker { 
                max-height: 140px; 
                gap: 8px; 
                padding: 5px;
                justify-content: flex-start;
            }
            
            .model-btn .price { font-size: 0.6rem; }
            
            .color-btn { width: 30px; height: 30px; border-width: 2px; }
            .color-picker { gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 100%; }
            
            .start-btn { padding: 12px 40px; font-size: 1.2rem; }
            .garage-btn, .back-btn { padding: 12px 30px; font-size: 1.1rem; margin-top: 0; }
            
            #stats-banner { 
                top: 10px; 
                justify-content: space-between; 
                padding: 0 15px;
            }
            .stat-badge { 
                min-width: unset; 
                padding: 4px 12px;
                transform: scale(0.85);
                transform-origin: top;
            }
            .stat-badge:first-child { transform-origin: top left; }
            .stat-badge:last-child { transform-origin: top right; }

            #fullscreen-btn {
                top: auto;
                bottom: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
            }
        }

        /* Show rotate overlay on portrait mobile */
        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-overlay { display: flex !important; }
        }
    </style>
</head>

<body>
    <!-- Rotate Device Overlay -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <div>Please rotate your device<br>to <b>landscape</b> mode</div>
    </div>

    <!-- Fullscreen Button -->
    <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>

    <div id="stats-banner">
        <div class="stat-badge">
            <span class="label">High Score</span>
            <span class="value" id="menu-highscore">0</span>
        </div>
        <div class="stat-badge" style="border-color: rgba(255, 255, 0, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 15px rgba(255, 255, 0, 0.1);">
            <span class="label" style="color: #ff0;">Coins</span>
            <span class="value" id="menu-coins">0</span>
        </div>
    </div>
    <div id="main-menu">
        <div id="menu-view-main" class="menu-view">
            <h1>NEON RACER</h1>
            <div class="main-actions">
                <button class="start-btn" id="start-btn">Start Engine</button>
                <button class="garage-btn" id="open-garage-btn">Garage & Shop</button>
            </div>
        </div>

        <div id="menu-view-garage" class="menu-view" style="display: none; flex-direction: column; align-items: center;">
            <h2 style="margin-top: 10px;">GARAGE & SHOP</h2>
            
            <!-- Step 1: Category Selection -->
            <div id="garage-category-selection" style="display: flex; gap: 20px; margin: 40px 0;">
                <button class="start-btn" id="btn-select-land" style="padding: 30px 60px; font-size: 1.5rem; background: linear-gradient(45deg, #00ffff, #0088ff);">LAND</button>
                <button class="start-btn" id="btn-select-air" style="padding: 30px 60px; font-size: 1.5rem; background: linear-gradient(45deg, #ff00ff, #8800ff);">AIR</button>
            </div>

            <!-- Step 2: Vehicle Picker (Initially Hidden) -->
            <div id="garage-vehicle-picker" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                <div class="options-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 10px;">
                        <h3 id="current-category-label" style="margin: 0; color: #0ff; letter-spacing: 3px;">LAND VEHICLES</h3>
                        <button class="back-btn" id="btn-change-category" style="margin: 0; font-size: 0.9rem; padding: 10px 20px;">SWITCH CATEGORY</button>
                    </div>
                    <h3>Vehicle Type</h3>
                    <div class="model-picker" id="model-picker">
                        <!-- Populated by JS -->
                    </div>

                    <h3>Paint Job</h3>
                    <div class="color-picker" id="color-picker">
                        <div class="color-btn selected" style="background-color: #00ffff; box-shadow: 0 0 20px #00ffff;"
                            data-color="0x00ffff"></div>
                        <div class="color-btn" style="background-color: #ff0055; box-shadow: 0 0 20px #ff0055;"
                            data-color="0xff0055"></div>
                        <div class="color-btn" style="background-color: #ffff00; box-shadow: 0 0 20px #ffff00;"
                            data-color="0xffff00"></div>
                        <div class="color-btn" style="background-color: #00ff00; box-shadow: 0 0 20px #00ff00;"
                            data-color="0x00ff00"></div>
                        <div class="color-btn" style="background-color: #ffffff; box-shadow: 0 0 20px #ffffff;"
                            data-color="0xffffff"></div>
                        <div class="color-btn" style="background-color: #000000; box-shadow: 0 0 20px #555; border-color: #555;"
                            data-color="0x111111"></div>
                    </div>
                </div>
            </div>
            <button class="back-btn" id="back-to-main-btn" style="margin-top: 20px;">Back</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="score">0</span> | COINS: <span id="in-game-coins">0</span> | SPEED: <span id="speed">0</span> MPH</div>
    <div class="vignette"></div>
    <div id="wasted">
        <h1 style="font-size: 7rem; font-style: italic; text-shadow: 0 0 30px #f00;">WASTED</h1>
        <button onclick="restartGame()"
            style="background: linear-gradient(45deg, #f0f, #f00); color:white; border:none; padding:15px 50px; cursor:pointer; font-weight:bold; font-size: 1.5rem; border-radius: 30px; box-shadow: 0 0 20px #f00; margin-top: 20px;">RETRY</button>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls">
        <div class="touch-btn" id="btn-gas">▲</div>
        <div class="touch-btn" id="btn-brake">▼</div>
        <div class="touch-btn" id="btn-left">◀</div>
        <div class="touch-btn" id="btn-right">▶</div>
        <div class="touch-btn" id="btn-up">⇡</div>
        <div class="touch-btn" id="btn-down">⇣</div>
    </div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            } 
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- MOBILE DETECTION ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 1024);

        // --- FULLSCREEN TOGGLE ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        });

        // --- GAME STATE ---
        let gameState = 'MENU'; // MENU, PLAYING, DYING, DEAD
        let playerColor = 0x00ffff;
        let playerModelType = 'sports';
        let deathTimer = 0;
        let crashPos = new THREE.Vector3();

        let coinsCount = parseInt(localStorage.getItem('neon_racer_coins')) || 0;
        let highScore = parseInt(localStorage.getItem('neon_racer_highscore')) || 0;
        let unlockedModels = JSON.parse(localStorage.getItem('neon_racer_unlocked')) || ['sports', 'sedan', 'truck', 'drone'];

        document.getElementById('menu-highscore').innerText = highScore;
        document.getElementById('menu-coins').innerText = coinsCount;

        // --- SHADER BENDING SYSTEM ---
        const customUniforms = {
            uCurve: { value: 0.0 }
        };

        const AIR_MODELS = ['helicopter', 'plane', 'drone', 'biplane', 'fighter_jet'];

        function bendMat(material) {
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uCurve = customUniforms.uCurve;
                shader.vertexShader = `
                    uniform float uCurve;
                ` + shader.vertexShader;

                shader.vertexShader = shader.vertexShader.replace(
                    '#include <project_vertex>',
                    `
                    vec4 worldPos = modelMatrix * vec4( transformed, 1.0 );
                    float distZ = worldPos.z - cameraPosition.z;
                    // Only bend vertices that are in front of the camera
                    if (distZ > 0.0) {
                        worldPos.x -= uCurve * distZ * distZ * 0.0002;
                    }
                    vec4 mvPosition = viewMatrix * worldPos;
                    gl_Position = projectionMatrix * mvPosition;
                    `
                );
            };
            return material;
        }

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020008);
        scene.fog = new THREE.FogExp2(0x020008, 0.008); // Reduced fog for better visibility

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- POST-PROCESSING (BLOOM) - lighter on mobile ---
        let composer;
        const useBloom = true;
        if (useBloom) {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
            bloomPass.threshold = 0.6;
            bloomPass.strength = 1.0;
            bloomPass.radius = 0.2;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        // --- WORLD LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.35)); // Slightly brighter ambient light

        const moon = new THREE.DirectionalLight(0xaaaaff, 1.0);
        moon.position.set(20, 40, 20);
        moon.castShadow = true;
        moon.shadow.mapSize.width = 1024;
        moon.shadow.mapSize.height = 1024;
        moon.shadow.camera.near = 0.5;
        moon.shadow.camera.far = 150;
        const d = 40;
        moon.shadow.camera.left = -d;
        moon.shadow.camera.right = d;
        moon.shadow.camera.top = d;
        moon.shadow.camera.bottom = -d;
        moon.shadow.bias = -0.001;
        scene.add(moon);

        const hemiLight = new THREE.HemisphereLight(0xff00ff, 0x00ffff, 0.3);
        scene.add(hemiLight);

        // --- CITY BUILDINGS (OPTIMIZED) ---
        const buildings = [];
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        
        // --- PROCEDURAL NEON TEXTURES ---
        function createNeonTexture(name, color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, 512, 256);

            // Border
            ctx.strokeStyle = color1;
            ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, 472, 216);

            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = color1;

            // Text
            ctx.fillStyle = color2;
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';

        // --- PROCEDURAL CAR GENERATOR ---
        function createCarMesh(type, colorHex, simplified = false) {
            const group = new THREE.Group();

            const bodyMat = bendMat(new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2, metalness: 0.9 }));
            const glassMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 1.0 }));
            const wheelMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8, metalness: 0.2 }));
            const rimMat = bendMat(new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.1, metalness: 1.0 }));
            const detailMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.5 }));

            const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.25, simplified ? 8 : 16);
            wheelGeom.rotateZ(Math.PI / 2);
            const rimGeom = new THREE.CylinderGeometry(0.22, 0.22, 0.27, 8);
            rimGeom.rotateZ(Math.PI / 2);

            function addWheel(x, y, z, scale = 1) {
                if (simplified) {
                    const wheel = new THREE.Mesh(wheelGeom, wheelMat);
                    wheel.position.set(x, y, z);
                    wheel.scale.set(scale, scale, scale);
                    group.add(wheel);
                    return;
                }
                const wheelGroup = new THREE.Group();
                const wheel = new THREE.Mesh(wheelGeom, wheelMat);
                wheel.castShadow = true;
                wheelGroup.add(wheel);
                const rim = new THREE.Mesh(rimGeom, rimMat);
                wheelGroup.add(rim);
                wheelGroup.position.set(x, y, z);
                wheelGroup.scale.set(scale, scale, scale);
                group.add(wheelGroup);
            }

            function addBox(w, h, d, y, z, mat, shadow = true) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                mesh.position.set(0, y, z);
                mesh.castShadow = shadow;
                mesh.receiveShadow = shadow;
                group.add(mesh);
                return mesh;
            }

            function addDetail(w, h, d, x, y, z, mat) {
                if (simplified) return;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                group.add(mesh);
                return mesh;
            }

            function addLight(x, y, z, color, w=0.3, h=0.1) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.1), bendMat(new THREE.MeshBasicMaterial({ color: color })));
                mesh.position.set(x, y, z);
                group.add(mesh);
            }

            function addMirror(x, y, z) {
                if (simplified) return;
                const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.2), bodyMat);
                mirror.position.set(x, y, z);
                group.add(mirror);
            }

            if (type === 'sports') {
                addBox(1.8, 0.4, 3.6, 0.3, 0, bodyMat);
                addBox(1.5, 0.4, 1.4, 0.65, 0.1, glassMat);
                addBox(1.9, 0.05, 0.6, 0.8, -1.6, bodyMat); // wing
                addMirror(0.95, 0.6, 0.8); addMirror(-0.95, 0.6, 0.8);
                addLight(0.6, 0.35, 1.8, 0xffffff); addLight(-0.6, 0.35, 1.8, 0xffffff);
                addLight(0.6, 0.35, -1.8, 0xff0000, 0.5); addLight(-0.6, 0.35, -1.8, 0xff0000, 0.5);
                addWheel(0.95, 0.35, 1.2); addWheel(-0.95, 0.35, 1.2);
                addWheel(0.95, 0.35, -1.2); addWheel(-0.95, 0.35, -1.2);
            } else if (type === 'sedan') {
                addBox(1.7, 0.6, 3.4, 0.4, 0, bodyMat);
                addBox(1.5, 0.5, 1.8, 0.9, -0.1, glassMat);
                addMirror(0.9, 0.7, 0.6); addMirror(-0.9, 0.7, 0.6);
                addLight(0.6, 0.4, 1.7, 0xffffff); addLight(-0.6, 0.4, 1.7, 0xffffff);
                addLight(0.6, 0.4, -1.7, 0xff0000); addLight(-0.6, 0.4, -1.7, 0xff0000);
                addWheel(0.85, 0.35, 1.0); addWheel(-0.85, 0.35, 1.0);
                addWheel(0.85, 0.35, -1.0); addWheel(-0.85, 0.35, -1.0);
            } else if (type === 'truck') {
                addBox(2.0, 1.0, 4.0, 0.6, 0, bodyMat);
                addBox(1.8, 0.8, 1.6, 1.4, 0.8, glassMat);
                addBox(1.8, 0.4, 2.0, 1.0, -1.0, detailMat);
                addMirror(1.1, 1.2, 1.2); addMirror(-1.1, 1.2, 1.2);
                addLight(0.7, 0.6, 2.0, 0xffffff, 0.4, 0.2); addLight(-0.7, 0.6, 2.0, 0xffffff, 0.4, 0.2);
                addLight(0.7, 0.6, -2.0, 0xff0000, 0.4, 0.2); addLight(-0.7, 0.6, -2.0, 0xff0000, 0.4, 0.2);
                addWheel(1.1, 0.45, 1.4, 1.4); addWheel(-1.1, 0.45, 1.4, 1.4);
                addWheel(1.1, 0.45, -1.4, 1.4); addWheel(-1.1, 0.45, -1.4, 1.4);
            } else if (type === 'coupe') {
                addBox(1.7, 0.5, 3.2, 0.35, 0, bodyMat);
                addBox(1.4, 0.4, 1.2, 0.75, 0.2, glassMat);
                addMirror(0.9, 0.65, 0.5); addMirror(-0.9, 0.65, 0.5);
                addLight(0.6, 0.35, 1.6, 0xffffff); addLight(-0.6, 0.35, 1.6, 0xffffff);
                addLight(0.6, 0.35, -1.6, 0xff0000); addLight(-0.6, 0.35, -1.6, 0xff0000);
                addWheel(0.9, 0.35, 1.0); addWheel(-0.9, 0.35, 1.0);
                addWheel(0.9, 0.35, -1.0); addWheel(-0.9, 0.35, -1.0);
            } else if (type === 'suv') {
                addBox(1.9, 0.9, 3.8, 0.5, 0, bodyMat);
                addBox(1.7, 0.6, 2.2, 1.2, -0.3, glassMat);
                addMirror(1.05, 1.0, 0.6); addMirror(-1.05, 1.0, 0.6);
                addLight(0.7, 0.5, 1.9, 0xffffff, 0.4, 0.2); addLight(-0.7, 0.5, 1.9, 0xffffff, 0.4, 0.2);
                addLight(0.7, 0.5, -1.9, 0xff0000, 0.4, 0.2); addLight(-0.7, 0.5, -1.9, 0xff0000, 0.4, 0.2);
                addWheel(1.0, 0.45, 1.2, 1.2); addWheel(-1.0, 0.45, 1.2, 1.2);
                addWheel(1.0, 0.45, -1.2, 1.2); addWheel(-1.0, 0.45, -1.2, 1.2);
            } else if (type === 'van') {
                addBox(1.9, 1.3, 4.0, 0.7, 0, bodyMat);
                addBox(1.7, 0.5, 1.0, 1.5, 1.2, glassMat);
                addMirror(1.05, 1.3, 1.5); addMirror(-1.05, 1.3, 1.5);
                addLight(0.7, 0.6, 2.0, 0xffffff, 0.4, 0.3); addLight(-0.7, 0.6, 2.0, 0xffffff, 0.4, 0.3);
                addLight(0.7, 0.6, -2.0, 0xff0000, 0.5, 0.2); addLight(-0.7, 0.6, -2.0, 0xff0000, 0.5, 0.2);
                addWheel(1.0, 0.35, 1.3); addWheel(-1.0, 0.35, 1.3);
                addWheel(1.0, 0.35, -1.3); addWheel(-1.0, 0.35, -1.3);
            } else if (type === 'hypercar') {
                // High-fidelity hypercar
                addBox(2.2, 0.3, 4.2, 0.2, 0, bodyMat);
                addBox(1.4, 0.3, 1.6, 0.5, 0.2, glassMat);
                // Aerodynamics
                addDetail(2.2, 0.05, 0.8, 0, 0.8, -1.8, bodyMat); // Main Wing
                addDetail(1.8, 0.05, 0.6, 0, 0.9, -1.9, bodyMat); // Double Wing
                addDetail(2.2, 0.1, 0.5, 0, 0.15, 2.1, detailMat); // Aggressive Splitter
                addDetail(0.4, 0.6, 0.8, 0.9, 0.4, -0.2, detailMat); // Side intakes
                addDetail(0.4, 0.6, 0.8, -0.9, 0.4, -0.2, detailMat);
                addMirror(1.1, 0.5, 0.6); addMirror(-1.1, 0.5, 0.6);
                addLight(0.8, 0.2, 2.0, 0x00ffff, 0.6, 0.05); addLight(-0.8, 0.2, 2.0, 0x00ffff, 0.6, 0.05); // Cyan LED
                addLight(0, 0.25, -2.1, 0xff00ff, 2.0, 0.05); // Pink light bar back
                addWheel(1.1, 0.35, 1.5, 1.1); addWheel(-1.1, 0.35, 1.5, 1.1);

        let audioCtx;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Engine Synth
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            
            engineFilter = audioCtx.createBiquadFilter();
            engineFilter.type = 'lowpass';
            engineFilter.frequency.value = 100;
            
            const engineGain = audioCtx.createGain();
            engineGain.gain.value = 0.15;
            
            engineOsc.connect(engineFilter);
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();

            // Wind Synth
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            const windSource = audioCtx.createBufferSource();
            windSource.buffer = noiseBuffer;
            windSource.loop = true;
            
            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'lowpass';
            windFilter.frequency.value = 600;
            
            windGain = audioCtx.createGain();
            windGain.gain.value = 0.0;
            
            windSource.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(audioCtx.destination);
            windSource.start();
        }

        function playCrashSound() {
            if (!audioCtx) return;
            // Explosion Sweep
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);

            // Explosion Noise
            const bufferSize = audioCtx.sampleRate * 1;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            noiseFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(1.5, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseSource.start();
        }

        function playCoinSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

            const target = e.currentTarget;
            const modelId = target.getAttribute('data-model');
            const price = parseInt(target.getAttribute('data-price'));
            
            if (!unlockedModels.includes(modelId)) {
                if (coinsCount >= price) {
                    coinsCount -= price;
                    unlockedModels.push(modelId);
                    localStorage.setItem('neon_racer_coins', coinsCount);
                    localStorage.setItem('neon_racer_unlocked', JSON.stringify(unlockedModels));
                    document.getElementById('menu-coins').innerText = coinsCount;
                    target.classList.remove('locked');
                    target.querySelector('.price').innerText = 'UNLOCKED';
                } else {
                    target.style.transform = 'translate(-5px, 0)';
                    setTimeout(() => target.style.transform = '', 100);
                    return;

            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('selected'));
            target.classList.add('selected');
            playerModelType = modelId;
            updatePlayerCar();

            const isAir = AIR_MODELS.includes(playerModelType);
            coins.forEach((coin, i) => {
                coin.position.y = isAir ? 25 : 0.8;
                // Also spread them out slightly more if they are on top of each other
                if (coin.position.z < player.position.z + 50) {
                   coin.position.z = player.position.z + 200 + (i * 35);
                }
            });
        });

        // --- TRAFFIC SYSTEM ---
        const traffic = [];
        const trafficBoxes = [];
        const playerBox = new THREE.Box3();

        const lanesLeft = [-11, -4]; // Oncoming lanes
        const lanesRight = [4, 11];  // Same direction lanes

        function createTrafficCar(isOncoming, initialZ) {
            const car = new THREE.Group();

            const models = ['sports', 'sedan', 'truck'];
            const type = models[Math.floor(Math.random() * models.length)];

            const colors = [0x555555, 0xaa0000, 0x0000aa, 0x228822, 0xdddddd, 0xff8800, 0x8800ff, 0x111111];
            const color = colors[Math.floor(Math.random() * colors.length)];

            const mesh = createCarMesh(type, color, true); // Simplified for traffic
            car.add(mesh);

            if (isOncoming) {
                const hLight = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                hLight.position.set(0, 0.5, 1.6);
                car.add(hLight);
            } else {
                const tLight = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                tLight.position.set(0, 0.5, -1.6);
                car.add(tLight);
            }

            const laneList = isOncoming ? lanesLeft : lanesRight;
            const targetLaneX = laneList[Math.floor(Math.random() * laneList.length)];

            car.position.set(targetLaneX, 0, initialZ);

            if (isOncoming) car.rotation.y = Math.PI;

            car.userData = {
                targetLaneX: targetLaneX,
                velocity: isOncoming ? -0.3 - Math.random() * 0.3 : 0.15 + Math.random() * 0.2,
                angle: 0,
                isOncoming: isOncoming,
                meshGroup: mesh
            };

            scene.add(car);
            traffic.push(car);
            trafficBoxes.push(new THREE.Box3());
        }

        const trafficCount = isMobile ? 18 : 25;
        for (let i = 0; i < trafficCount; i++) {
            createTrafficCar(Math.random() > 0.4, 150 + (i * 40));
        }

        // --- AIR TRAFFIC ---
        const airTraffic = [];
        const airTrafficBoxes = [];
        function createAirTraffic(initialZ) {
            const models = ['plane', 'biplane', 'helicopter'];
            const type = models[Math.floor(Math.random() * models.length)];
            const color = [0xff00ff, 0x00ffff, 0xffff00][Math.floor(Math.random()*3)];
            const ship = createCarMesh(type, color, true);
            const group = new THREE.Group();
            group.add(ship);
            group.position.set((Math.random()-0.5)*40, 10 + Math.random()*20, initialZ);
            group.userData = {
                velocity: 0.2 + Math.random()*0.3,
                mesh: ship
            };
            scene.add(group);
            airTraffic.push(group);
            airTrafficBoxes.push(new THREE.Box3());
        }
        for(let i=0; i<5; i++) createAirTraffic(500 + i*400);

        // --- COIN SYSTEM ---
        const coins = [];
        const coinBoxes = [];
        const coinGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16);
        coinGeo.rotateX(Math.PI / 2);
        const coinMat = bendMat(new THREE.MeshStandardMaterial({ 
            color: 0xffff00, 
            emissive: 0xffaa00, 
            emissiveIntensity: 2,
            metalness: 1,
            roughness: 0.2
        }));

        function createCoin(zPos) {
            const coin = new THREE.Mesh(coinGeo, coinMat);
            const isAir = AIR_MODELS.includes(playerModelType);
            const lanes = [-14, -5, 5, 14]; // Wider lanes for aircraft
            const x = lanes[Math.floor(Math.random() * lanes.length)];
            let y = 0.8;
            if (isAir) {
                y = 25;
            }
            coin.position.set(x, y, zPos);
            scene.add(coin);
            coins.push(coin);
            coinBoxes.push(new THREE.Box3());
        }

        const coinCount = isMobile ? 50 : 80;
        for (let i = 0; i < coinCount; i++) {
            createCoin(50 + (i * 35));
        }

        // --- PHYSICS & INPUT ---
        let velocity = 0;
        let angle = 0;
        const keys = {};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyT') {
                coinsCount += 10000;
                localStorage.setItem('neon_racer_coins', coinsCount);
                const menuCoins = document.getElementById('menu-coins');
                const gameCoins = document.getElementById('in-game-coins');
                if (menuCoins) menuCoins.innerText = coinsCount;
                if (gameCoins) gameCoins.innerText = coinsCount;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- MOBILE TOUCH CONTROLS ---
        if (isMobile) {
            // Don't show controls until game starts - they are shown in startBtn click handler

            const touchMap = {
                'btn-gas': 'KeyW',
                'btn-brake': 'KeyS',
                'btn-left': 'KeyA',
                'btn-right': 'KeyD',
                'btn-up': 'Space',
                'btn-down': 'ShiftLeft'
            };

            Object.entries(touchMap).forEach(([btnId, keyCode]) => {
                const btn = document.getElementById(btnId);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    keys[keyCode] = true;
                    btn.classList.add('pressed');
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    keys[keyCode] = false;
                    btn.classList.remove('pressed');
                }, { passive: false });
                btn.addEventListener('touchcancel', (e) => {
                    keys[keyCode] = false;
                    btn.classList.remove('pressed');
                });
            });
        }

        function handleResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 200);
        });

        // Fix initial sizing on mobile
        setTimeout(handleResize, 100);

        // Curve target generation
        let targetCurve = 0;
        let targetY = 0;
        setInterval(() => {
            if (gameState === 'PLAYING') {
                targetCurve = (Math.random() - 0.5) * 6.0;
            }
        }, 4000);

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'PLAYING' || gameState === 'DYING') {
                customUniforms.uCurve.value += (targetCurve - customUniforms.uCurve.value) * 0.02;

                let isDeadLoop = (gameState === 'DYING');

                 if (!isDeadLoop) {
                    if (keys['KeyW']) velocity += 0.015;
                    if (keys['KeyS']) velocity -= 0.025; // Brakes

                    if (Math.abs(velocity) > 0.05) {
                        const turnRate = 0.02 * Math.sign(velocity);
                        if (keys['KeyA']) angle += turnRate;
                        if (keys['KeyD']) angle -= turnRate;
                    }

                    velocity *= 0.98; // Drag
                    angle *= 0.82;    // Steering friction
                    velocity = Math.max(-0.3, Math.min(velocity, 2.5));
                    
                    const isAir = AIR_MODELS.includes(playerModelType);
                    const hoverHeight = isAir ? 25 : 0;
                    if (gameState === 'PLAYING') {
                        targetY = hoverHeight;
                    }
                    
                    const finalTargetY = (gameState === 'PLAYING') ? (isAir ? Math.max(targetY, 2) : 0) : player.position.y;
                    player.position.y += (finalTargetY - player.position.y) * 0.1;

                    player.rotation.y += angle * (velocity * 0.5);
                    
                    // Tilting and Banking
                    if (isAir) {
                        playerMesh.rotation.x = THREE.MathUtils.lerp(playerMesh.rotation.x, (velocity * 0.1), 0.1);
                        playerMesh.rotation.z = THREE.MathUtils.lerp(playerMesh.rotation.z, (angle * 2), 0.1);
                    } else {
                        playerMesh.rotation.x = 0;
                        playerMesh.rotation.z = 0;
                    }

                    player.translateZ(velocity);

                    playerBox.setFromObject(player);
                    playerBox.expandByScalar(-0.1); 
                } else {
                    // SLOW MOTION CRASH PHYSICS
                    deathTimer += 0.01;
                    velocity *= 0.96; // Slow down gradually
                    player.translateZ(velocity * 0.2); // Move in slow motion
                    player.rotation.y += angle * 0.1; // Slowly drift
                }

                // Update Audio
                if (audioCtx && engineOsc) {
                    const speedRatio = Math.max(0, velocity / 2.5);
                    engineOsc.frequency.value = 40 + (speedRatio * 120); // Pitch
                    engineFilter.frequency.value = 100 + (speedRatio * 600); // Filter
                    windGain.gain.value = speedRatio * 0.8;
                }

                // --- TRAFFIC PHYSICS & PACING AI ---
                traffic.forEach((car, i) => {
                    const laneDiff = car.userData.targetLaneX - car.position.x;

                    if (!isDeadLoop) {
                        if (Math.abs(laneDiff) > 0.3) {
                            car.userData.angle = Math.sign(laneDiff) * 0.008;
                        } else {
                            car.userData.angle *= 0.8;
                        }
                    }

                    let dirMult = car.userData.isOncoming ? -1 : 1;
                    
                    // Smooth steering logic with direction correction
                    const steeringSign = car.userData.isOncoming ? -1 : 1;
                    const targetRot = (car.userData.isOncoming ? Math.PI : 0) + (Math.abs(laneDiff) > 0.3 ? Math.sign(laneDiff) * 0.15 * steeringSign : 0);
                    car.rotation.y = THREE.MathUtils.lerp(car.rotation.y, targetRot, 0.08);

                    car.translateZ(Math.abs(car.userData.velocity) * (isDeadLoop ? 0.2 : 1)); // Slow mo traffic
                    
                    // Road boundary safety clamp
                    car.position.x = THREE.MathUtils.clamp(car.position.x, -18, 18);

                    if (!isDeadLoop) {
                        // MANUAL BOX UPDATE (FASTER THAN setFromObject)
                        trafficBoxes[i].min.set(car.position.x - 1.5, car.position.y, car.position.z - 2.5);
                        trafficBoxes[i].max.set(car.position.x + 1.5, car.position.y + 2.5, car.position.z + 2.5);
                        
                        const isAir = AIR_MODELS.includes(playerModelType);
                        if (!(isAir && player.position.y > 5)) {
                            if (playerBox.intersectsBox(trafficBoxes[i])) triggerWasted();
                        }

                        // Respawn Logic with Pacing
                        const dist = car.position.z - player.position.z;
                        if (dist < -100 || dist > 1000) {
                            const laneList = car.userData.isOncoming ? lanesLeft : lanesRight;
                            car.userData.targetLaneX = laneList[Math.floor(Math.random() * laneList.length)];

                            let maxZ = player.position.z + 200;
                            traffic.forEach(c => {
                                if (c !== car && Math.abs(c.userData.targetLaneX - car.userData.targetLaneX) < 1) {
                                    if (c.position.z > maxZ) {
                                        maxZ = c.position.z;
                                    }
                                }
                            });

                            car.position.z = maxZ + 60 + Math.random() * 60;
                            car.position.x = car.userData.targetLaneX;
                            car.rotation.y = car.userData.isOncoming ? Math.PI : 0;
                            car.userData.angle = 0;
                            car.userData.velocity = car.userData.isOncoming ? -0.3 - Math.random() * 0.3 : 0.15 + Math.random() * 0.2;

                            const models = ['sports', 'sedan', 'truck'];
                            const colors = [0x555555, 0xaa0000, 0x0000aa, 0x228822, 0xdddddd, 0xff8800, 0x8800ff, 0x111111];
                            car.remove(car.userData.meshGroup);
                            const newMesh = createCarMesh(
                                models[Math.floor(Math.random() * models.length)],
                                colors[Math.floor(Math.random() * colors.length)],
                                true // Simplified for traffic
                            );
                            car.userData.meshGroup = newMesh;
                            car.add(newMesh);
                        }
                    }
                });

                // --- AIR TRAFFIC PHYSICS ---
                airTraffic.forEach((ship, i) => {
                    ship.translateZ(ship.userData.velocity * (isDeadLoop ? 0.2 : 1));
                    if (!isDeadLoop) {
                        airTrafficBoxes[i].min.set(ship.position.x - 3, ship.position.y - 1, ship.position.z - 4);
                        airTrafficBoxes[i].max.set(ship.position.x + 3, ship.position.y + 1, ship.position.z + 4);
                        if (playerBox.intersectsBox(airTrafficBoxes[i])) triggerWasted();
                        if (ship.position.z < player.position.z - 100) {
                            ship.position.z = player.position.z + 1000 + Math.random()*500;
                            ship.position.x = (Math.random()-0.5)*60;
                            ship.position.y = 25;
                        }
                    }
                });

                // --- HAZARDS RECYCLE ---
                if (!isDeadLoop) {
                    hazards.forEach(h => {
                        if (h.position.z < player.position.z - 100) {
                            h.position.z += 4800; 
                            if (h.children.length > 1 && h.children[0].geometry.type === 'CylinderGeometry') {
                                // Radio tower
                                h.position.x = Math.random() > 0.5 ? -50 : 50;
                            } else {
                                // Floating Advert - Randomize side but keep over road
                                const side = (Math.random()-0.5)*35;
                                h.position.x = side;
                                h.position.y = 25;
                            }
                        }
                        // Check collision with hazards (Manual Box check)
                        let hSizeX = 15; let hSizeY = 100; // Large for towers
                        if (h.children.length > 2 && h.children[0].geometry.type === 'BoxGeometry') {
                            // Floating Advert
                            hSizeX = 12; hSizeY = 8;
                        }
                        const hMinX = h.position.x - hSizeX; const hMaxX = h.position.x + hSizeX;
                        const hMinY = h.position.y - hSizeY; const hMaxY = h.position.y + hSizeY;
                        const hMinZ = h.position.z - 1;     const hMaxZ = h.position.z + 1;
                        
                        if (playerBox.min.x < hMaxX && playerBox.max.x > hMinX &&
                            playerBox.min.y < hMaxY && playerBox.max.y > hMinY &&
                            playerBox.min.z < hMaxZ && playerBox.max.z > hMinZ) {
                            triggerWasted();
                        }
                    });
                }

                // --- AIRCRAFT ANIMATIONS ---
                if (playerMesh.userData.mainRotor) playerMesh.userData.mainRotor.rotation.y += 0.5;
                if (playerMesh.userData.rearRotor) playerMesh.userData.rearRotor.rotation.x += 0.5;
                if (playerMesh.userData.propeller) playerMesh.userData.propeller.rotation.z += 0.5;
                if (playerMesh.userData.rotors) playerMesh.userData.rotors.forEach(r => r.rotation.y += 0.5);
                if (playerMesh.userData.propellers) playerMesh.userData.propellers.forEach(p => p.rotation.z += 0.5);

                // --- COIN LOGIC ---
                coins.forEach((coin, i) => {
                    coin.rotation.z += 0.05; // Spin coin
                    
                    if (!isDeadLoop) {
                        // MANUAL BOX UPDATE (FASTER)
                        coinBoxes[i].min.set(coin.position.x - 1, coin.position.y - 1, coin.position.z - 1);
                        coinBoxes[i].max.set(coin.position.x + 1, coin.position.y + 1, coin.position.z + 1);
                        
                        if (playerBox.intersectsBox(coinBoxes[i])) {
                            // Collect coin
                            coinsCount++;
                            document.getElementById('in-game-coins').innerText = coinsCount;
                            playCoinSound();
                            
                            // Move far ahead to "recycle" immediately
                            coin.position.z = player.position.z + 600 + Math.random() * 400;
                            const lanes = [-14, -5, 5, 14];
                            coin.position.x = lanes[Math.floor(Math.random() * lanes.length)];
                            const isAir = AIR_MODELS.includes(playerModelType);
                            if (isAir) {
                                coin.position.y = 25;
                            } else {
                                coin.position.y = 0.8;
                            }
                        }

                        // Respawn if behind
                        if (coin.position.z < player.position.z - 50) {
                            coin.position.z = player.position.z + 600 + Math.random() * 400;
                            const lanes = [-14, -5, 5, 14];
                            coin.position.x = lanes[Math.floor(Math.random() * lanes.length)];
                            const isAir = AIR_MODELS.includes(playerModelType);
                            if (isAir) {
                                coin.position.y = 25;
                            } else {
                                coin.position.y = 0.8;
                            }
                        }
                    }
                });

                // --- BUILDINGS RECYCLE LOGIC ---
                if (!isDeadLoop) {
                    buildings.forEach(b => {
                        if (b.position.z < player.position.z - 150) {
                            b.position.z += 1500 + Math.random() * 200;
                            const isLeft = b.position.x < 0;
                            b.position.x = isLeft ? -35 - Math.random() * 30 : 35 + Math.random() * 30;
                        }
                    });
                    
                    streetLights.forEach(sl => {
                        if (sl.position.z < player.position.z - 50) {
                            sl.position.z += 1000;
                        }
                    });

                    banners.forEach(b => {
                        if (b.position.z < player.position.z - 100) {
                            b.position.z += 2000;
                        }
                    });

                    reflectors.forEach(r => {
                        if (r.position.z < player.position.z - 50) {
                            r.position.z += 2000;
                        }
                    });
                }

                if (!isDeadLoop && Math.abs(player.position.x) > 16) triggerWasted();

                moon.position.z = player.position.z + 20;
                moon.target.position.z = player.position.z;
                moon.target.updateMatrixWorld();

                road.position.z = player.position.z;
                centerLine.position.z = player.position.z;
                leftLine.position.z = player.position.z;
                rightLine.position.z = player.position.z;

                // Recycle Sky Reflectors
                skyReflectors.forEach(refl => {
                    if (refl.position.z < player.position.z - 50) {
                        refl.position.z += 2000;
                    }
                });

                if (!isDeadLoop) {
                    document.getElementById('score').innerText = Math.floor(player.position.z / 10);
                    document.getElementById('speed').innerText = Math.floor(Math.abs(velocity) * 80);
                }
            }

            const offset = new THREE.Vector3(0, 4.5, -9).applyQuaternion(player.quaternion);

            if (gameState === 'MENU') {
                const t = Date.now() * 0.0005;
                camera.position.set(player.position.x + Math.sin(t) * 15, 6, player.position.z + Math.cos(t) * 15);
                camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            } else if (gameState === 'PLAYING') {
                camera.position.lerp(player.position.clone().add(offset), 0.15);
                const lookDist = 20;
                const curveOffset = customUniforms.uCurve.value * lookDist * lookDist * 0.0002;

                const lookAtPos = player.position.clone().add(new THREE.Vector3(-curveOffset, 0, lookDist).applyQuaternion(player.quaternion));
                camera.lookAt(lookAtPos);
            } else if (gameState === 'DYING') {
                // Cinematic slow mo spin
                const spinRadius = 12;
                camera.position.x = crashPos.x + Math.sin(deathTimer * 1.5) * spinRadius;
                camera.position.z = crashPos.z + Math.cos(deathTimer * 1.5) * spinRadius;
                camera.position.y = 5 + Math.sin(deathTimer * 0.5) * 3;
                camera.lookAt(player.position);
            }

            if (composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        function triggerWasted() {
            if (gameState === 'DEAD' || gameState === 'DYING') return;
            gameState = 'DYING';
            crashPos.copy(player.position);

            // Save Stats
            const currentScore = Math.floor(player.position.z / 10);
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem('neon_racer_highscore', highScore);
            }
            localStorage.setItem('neon_racer_coins', coinsCount);

            wastedDiv.style.display = 'flex';
            playCrashSound();
            // slight delay to ensure display flex applies before opacity
            setTimeout(() => {
                wastedDiv.classList.add('visible');
            }, 50);
        }

        function restartGame() {
            wastedDiv.classList.remove('visible');
            setTimeout(() => {
                wastedDiv.style.display = 'none';
                mainMenu.style.display = 'flex';
                document.getElementById('menu-view-main').style.display = 'flex';
                document.getElementById('menu-view-garage').style.display = 'none';
                document.getElementById('stats-banner').style.display = 'flex';
                document.getElementById('mobile-controls').style.display = 'none';
                uiDiv.style.display = 'none';
                
                gameState = 'MENU';
                customUniforms.uCurve.value = 0;
                targetCurve = 0;
                targetY = 0;

                // Reset player
                player.position.set(7, 0, 0);
                player.rotation.set(0, 0, 0);
                playerMesh.rotation.set(0, 0, 0);
                velocity = 0;
                angle = 0;
                deathTimer = 0;
                
                // Reset traffic
                traffic.forEach((car, i) => {
                    const isOncoming = car.userData.isOncoming;
                    const laneList = isOncoming ? lanesLeft : lanesRight;
                    const targetLaneX = laneList[Math.floor(Math.random() * laneList.length)];
                    car.position.set(targetLaneX, 0, 150 + (i * 40));
                    car.userData.velocity = isOncoming ? -0.3 - Math.random() * 0.3 : 0.15 + Math.random() * 0.2;
                    car.userData.angle = 0;
                });
                
                // Reset coins
                coins.forEach((coin, i) => {
                    const lanes = [-11, -4, 4, 11];
                    coin.position.set(lanes[Math.floor(Math.random() * lanes.length)], 0.8, 200 + (i * 40));
                });
                
                // Reset buildings
                buildings.forEach((b, i) => {
                    b.position.z = 100 + i * 35;
                });

                // Reset banners
                banners.forEach((b, i) => {
                    b.position.z = 400 + i * 400;
                });

                // Reset reflectors
                reflectors.forEach((r, i) => {
                    const groupIndex = Math.floor(i / 3);
                    r.position.z = groupIndex * 40;
                });
                
                // Reset UI
                document.getElementById('score').innerText = '0';
                document.getElementById('speed').innerText = '0';
                document.getElementById('menu-highscore').innerText = highScore;
                document.getElementById('menu-coins').innerText = coinsCount;
            }, 500);
        }
        window.restartGame = restartGame;

        // View Switching Logic
        const openGarageBtn = document.getElementById('open-garage-btn');
        const backToMainBtn = document.getElementById('back-to-main-btn');

        if (openGarageBtn) {
            openGarageBtn.addEventListener('click', () => {
                document.getElementById('menu-view-main').style.display = 'none';
                document.getElementById('menu-view-garage').style.display = 'flex';
                document.getElementById('garage-category-selection').style.display = 'flex';
                document.getElementById('garage-vehicle-picker').style.display = 'none';
            });
        }

        if (backToMainBtn) {
            backToMainBtn.addEventListener('click', () => {
                document.getElementById('menu-view-garage').style.display = 'none';
                document.getElementById('menu-view-main').style.display = 'flex';
            });
        }

        animate();
    </script>
</body>

</html>

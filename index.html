<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VICE CITY: TWO-WAY HIGHWAY</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px #f0f;
            z-index: 10;
            display: none;
        }

        #wasted {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            backdrop-filter: grayscale(1) blur(5px);
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        #wasted.visible {
            opacity: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px #000;
            pointer-events: none;
            z-index: 5;
        }

        #stats-banner {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 40;
            pointer-events: none;
        }

        .stat-badge {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            transition: all 0.3s;
        }

        .stat-badge .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #0ff;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .stat-badge .value {
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            font-weight: 900;
        }

        /* Main Menu Styling */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: linear-gradient(135deg, rgba(10, 0, 20, 0.8), rgba(20, 0, 40, 0.8));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 30;
            backdrop-filter: blur(8px);
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            padding: 20px 10px;
        }

        #main-menu h1 {
            font-size: 5rem;
            text-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
            margin-bottom: 5px;
            font-style: italic;
        }

        #main-menu h2 {
            font-size: 1.5rem;
            color: #ccc;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #f0f;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            max-width: 90vw;
        }

        .model-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            max-width: 800px;
            overflow-y: auto;
            max-height: 300px;
            padding: 15px 5px;
            /* Scrollbar for shop */
            scrollbar-width: thin;
            scrollbar-color: #0ff transparent;
        }

        .model-picker::-webkit-scrollbar {
            width: 6px;
        }
        .model-picker::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 4px;
        }

        .color-picker {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .model-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #555;
            padding: 10px 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
            gap: 8px;
        }

        .model-btn:hover:not(.locked) {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .model-btn.selected {
            border-color: #0ff;
            box-shadow: 0 0 20px #0ff;
            color: #0ff;
        }

        .model-btn .price {
            font-size: 0.9rem;
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }

        .model-btn.locked {
            border-color: #333;
            color: #777;
            background: rgba(0,0,0,0.5);
        }

        .model-btn.locked .price {
            color: #f55;
            text-shadow: none;
        }

        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .color-btn.selected {
            box-shadow: 0 0 20px #fff;
            transform: scale(1.2);
            border-color: #fff;
        }

        .start-btn {
            background: linear-gradient(45deg, #f0f, #0ff);
            color: #000;
            border: none;
            padding: 18px 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 40px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            color: #fff;
            background: linear-gradient(45deg, #0ff, #f0f);
        }

        /* New Menu Views */
        .menu-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .garage-btn, .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid #f0f;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .garage-btn:hover, .back-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 15px #f0f;
        }

        .main-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        /* --- MOBILE TOUCH CONTROLS --- */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 15;
            pointer-events: none;
        }

        .touch-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.1s;
        }

        .touch-btn:active, .touch-btn.pressed {
            background: rgba(0, 255, 255, 0.35);
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        #btn-gas   { bottom: 80px; right: 30px; }
        #btn-brake { bottom: 10px; right: 30px; }
        #btn-left  { bottom: 40px; left: 30px; }
        #btn-right { bottom: 40px; left: 120px; }

        /* --- FULLSCREEN BUTTON --- */
        #fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 50;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            border-color: #0ff;
        }

        /* --- ROTATE DEVICE OVERLAY --- */
        #rotate-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            gap: 20px;
        }
        #rotate-overlay .rotate-icon {
            font-size: 60px;
            animation: rotateAnim 2s ease-in-out infinite;
        }
        @keyframes rotateAnim {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media (max-width: 768px) {
            .start-btn { padding: 12px 35px; font-size: 1.2rem; }
            #stats-banner { top: 15px; gap: 10px; }
            .stat-badge { padding: 5px 12px; min-width: 80px; }
            .stat-badge .value { font-size: 16px; }
            .stat-badge .label { font-size: 8px; letter-spacing: 1px; }
            #ui { font-size: 13px; }
            #wasted h1 { font-size: 4rem !important; }
        }

        /* Landscape mobile: compact layout */
        @media (max-height: 500px) {
            #main-menu { justify-content: flex-start; padding-top: 10px; }
            #main-menu h1 { font-size: 1.8rem; margin: 3px 0; }
            #main-menu h2 { font-size: 0.8rem; margin: 3px 0; }
            .options-container { padding: 8px; margin-bottom: 8px; }
            .model-picker { max-height: 120px; gap: 8px; padding: 5px; }
            .model-btn { min-width: 75px; font-size: 0.7rem; padding: 4px 5px; gap: 3px; }
            .model-btn .price { font-size: 0.65rem; }
            .color-btn { width: 25px; height: 25px; border-width: 2px; }
            .color-picker { gap: 6px; }
            .start-btn { padding: 8px 25px; font-size: 1rem; }
            #stats-banner { top: 8px; transform: translateX(-50%) scale(0.85); }
        }

        /* Show rotate overlay on portrait mobile */
        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-overlay { display: flex !important; }
        }
    </style>
</head>

<body>
    <!-- Rotate Device Overlay -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <div>Please rotate your device<br>to <b>landscape</b> mode</div>
    </div>

    <!-- Fullscreen Button -->
    <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>

    <div id="stats-banner">
        <div class="stat-badge">
            <span class="label">High Score</span>
            <span class="value" id="menu-highscore">0</span>
        </div>
        <div class="stat-badge" style="border-color: rgba(255, 255, 0, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 15px rgba(255, 255, 0, 0.1);">
            <span class="label" style="color: #ff0;">Coins</span>
            <span class="value" id="menu-coins">0</span>
        </div>
    </div>
    <div id="main-menu">
        <div id="menu-view-main" class="menu-view">
            <h1>NEON RACER</h1>
            <div class="main-actions">
                <button class="start-btn" id="start-btn">Start Engine</button>
                <button class="garage-btn" id="open-garage-btn">Garage & Shop</button>
            </div>
        </div>

        <div id="menu-view-garage" class="menu-view" style="display: none;">
            <h2 style="margin-top: 10px;">GARAGE & SHOP</h2>
            <div class="options-container">
                <h3>Vehicle Type</h3>
                <div class="model-picker" id="model-picker">
                    <!-- Populated by JS -->
                </div>

                <h3>Paint Job</h3>
                <div class="color-picker" id="color-picker">
                    <div class="color-btn selected" style="background-color: #00ffff; box-shadow: 0 0 20px #00ffff;"
                        data-color="0x00ffff"></div>
                    <div class="color-btn" style="background-color: #ff0055; box-shadow: 0 0 20px #ff0055;"
                        data-color="0xff0055"></div>
                    <div class="color-btn" style="background-color: #ffff00; box-shadow: 0 0 20px #ffff00;"
                        data-color="0xffff00"></div>
                    <div class="color-btn" style="background-color: #00ff00; box-shadow: 0 0 20px #00ff00;"
                        data-color="0x00ff00"></div>
                    <div class="color-btn" style="background-color: #ffffff; box-shadow: 0 0 20px #ffffff;"
                        data-color="0xffffff"></div>
                    <div class="color-btn" style="background-color: #000000; box-shadow: 0 0 20px #555; border-color: #555;"
                        data-color="0x111111"></div>
                </div>
            </div>
            <button class="back-btn" id="back-to-main-btn">Back</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="score">0</span> | COINS: <span id="in-game-coins">0</span> | SPEED: <span id="speed">0</span> MPH</div>
    <div class="vignette"></div>
    <div id="wasted">
        <h1 style="font-size: 7rem; font-style: italic; text-shadow: 0 0 30px #f00;">WASTED</h1>
        <button onclick="restartGame()"
            style="background: linear-gradient(45deg, #f0f, #f00); color:white; border:none; padding:15px 50px; cursor:pointer; font-weight:bold; font-size: 1.5rem; border-radius: 30px; box-shadow: 0 0 20px #f00; margin-top: 20px;">RETRY</button>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls">
        <div class="touch-btn" id="btn-gas">▲</div>
        <div class="touch-btn" id="btn-brake">▼</div>
        <div class="touch-btn" id="btn-left">◀</div>
        <div class="touch-btn" id="btn-right">▶</div>
    </div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            } 
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- MOBILE DETECTION ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 1024);

        // --- FULLSCREEN TOGGLE ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        });

        // --- GAME STATE ---
        let gameState = 'MENU'; // MENU, PLAYING, DYING, DEAD
        let playerColor = 0x00ffff;
        let playerModelType = 'sports';
        let deathTimer = 0;
        let crashPos = new THREE.Vector3();

        let coinsCount = parseInt(localStorage.getItem('neon_racer_coins')) || 0;
        let highScore = parseInt(localStorage.getItem('neon_racer_highscore')) || 0;
        let unlockedModels = JSON.parse(localStorage.getItem('neon_racer_unlocked')) || ['sports', 'sedan', 'truck'];

        document.getElementById('menu-highscore').innerText = highScore;
        document.getElementById('menu-coins').innerText = coinsCount;

        // --- SHADER BENDING SYSTEM ---
        const customUniforms = {
            uCurve: { value: 0.0 }
        };

        function bendMat(material) {
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uCurve = customUniforms.uCurve;
                shader.vertexShader = `
                    uniform float uCurve;
                ` + shader.vertexShader;

                shader.vertexShader = shader.vertexShader.replace(
                    '#include <project_vertex>',
                    `
                    vec4 worldPos = modelMatrix * vec4( transformed, 1.0 );
                    float distZ = worldPos.z - cameraPosition.z;
                    // Only bend vertices that are in front of the camera
                    if (distZ > 0.0) {
                        worldPos.x -= uCurve * distZ * distZ * 0.0002;
                    }
                    vec4 mvPosition = viewMatrix * worldPos;
                    gl_Position = projectionMatrix * mvPosition;
                    `
                );
            };
            return material;
        }

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020008);
        scene.fog = new THREE.FogExp2(0x020008, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = isMobile ? THREE.BasicShadowMap : THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- POST-PROCESSING (BLOOM) - lighter on mobile ---
        let composer;
        const useBloom = true;
        if (useBloom) {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = isMobile ? 0.6 : 0.5;
            bloomPass.strength = isMobile ? 0.8 : 1.2;
            bloomPass.radius = isMobile ? 0.2 : 0.3;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        // --- WORLD LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const moon = new THREE.DirectionalLight(0xaaaaff, 1.0);
        moon.position.set(20, 40, 20);
        moon.castShadow = true;
        moon.shadow.mapSize.width = 1024;
        moon.shadow.mapSize.height = 1024;
        moon.shadow.camera.near = 0.5;
        moon.shadow.camera.far = 150;
        const d = 40;
        moon.shadow.camera.left = -d;
        moon.shadow.camera.right = d;
        moon.shadow.camera.top = d;
        moon.shadow.camera.bottom = -d;
        moon.shadow.bias = -0.001;
        scene.add(moon);

        const hemiLight = new THREE.HemisphereLight(0xff00ff, 0x00ffff, 0.3);
        scene.add(hemiLight);

        // --- CITY BUILDINGS (SYNTHWAVE WIREFRAMES) ---
        const buildings = [];
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        const edgeGeo = new THREE.EdgesGeometry(buildingGeo);

        const edgeColors = [0x00ffff, 0xff00ff, 0x00ff00, 0xffff00];

        function createBuilding(zPos) {
            const group = new THREE.Group();

            const isLeft = Math.random() > 0.5;
            const width = 15 + Math.random() * 25;
            const height = 50 + Math.random() * 150;
            const depth = 15 + Math.random() * 30;

            // Solid dark base to hide lines behind it
            const baseMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x020202, roughness: 0.9 }));
            const baseMesh = new THREE.Mesh(buildingGeo, baseMat);
            baseMesh.scale.set(width, height, depth);

            // Glowing neon edges
            const edgeColor = edgeColors[Math.floor(Math.random() * edgeColors.length)];
            // LineBasicMaterial doesn't use lights, acts like emissive
            const edgeMat = bendMat(new THREE.LineBasicMaterial({ color: edgeColor }));
            const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
            edgeMesh.scale.set(width, height, depth);

            group.add(baseMesh, edgeMesh);

            group.position.y = height / 2;
            group.position.x = isLeft ? -28 - Math.random() * 20 : 28 + Math.random() * 20;
            group.position.z = zPos;

            group.userData = { baseScaleY: height }; // Store for recycling height updates

            scene.add(group);
            buildings.push(group);
        }

        const buildingCount = isMobile ? 50 : 80;
        for (let i = 0; i < buildingCount; i++) {
            createBuilding(100 + i * 30);
        }

        // --- ROAD DESIGN (RESTORED MATTE) ---
        const roadGeom = new THREE.PlaneGeometry(40, 2000, 1, 100);
        const roadMat = bendMat(new THREE.MeshStandardMaterial({
            color: 0x111111,
            roughness: 0.7,
            metalness: 0.1
        }));
        const road = new THREE.Mesh(roadGeom, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.receiveShadow = true;
        scene.add(road);

        const createLine = (x, color, width = 0.3) => {
            const lineGeom = new THREE.PlaneGeometry(width, 2000, 1, 100);
            const lineMat = bendMat(new THREE.MeshBasicMaterial({ color: color }));
            const line = new THREE.Mesh(lineGeom, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(x, 0.05, 0);
            line.receiveShadow = true;
            scene.add(line);
            return line;
        };
        const centerLine = createLine(0, 0xffff00, 0.4); // Center Yellow
        const leftLine = createLine(15, 0xff00ff, 0.5); // Left Edge
        const rightLine = createLine(-15, 0xff00ff, 0.5); // Right Edge

        // --- PROCEDURAL CAR GENERATOR ---
        function createCarMesh(type, colorHex) {
            const group = new THREE.Group();

            const bodyMat = bendMat(new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3, metalness: 0.8 }));
            const glassMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.9 }));
            const wheelMat = bendMat(new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 }));

            const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16);
            wheelGeom.rotateZ(Math.PI / 2);

            function addWheel(x, y, z, scale = 1) {
                const wheel = new THREE.Mesh(wheelGeom, wheelMat);
                wheel.position.set(x, y, z);
                wheel.scale.set(scale, scale, scale);
                wheel.castShadow = true;
                group.add(wheel);
            }

            function addBox(w, h, d, y, z, mat, shadow = true) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                mesh.position.set(0, y, z);
                mesh.castShadow = shadow;
                mesh.receiveShadow = shadow;
                group.add(mesh);

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Engine Synth
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            
            engineFilter = audioCtx.createBiquadFilter();
            engineFilter.type = 'lowpass';
            engineFilter.frequency.value = 100;
            
            const engineGain = audioCtx.createGain();
            engineGain.gain.value = 0.15;
            
            engineOsc.connect(engineFilter);
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();

            // Wind Synth
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            const windSource = audioCtx.createBufferSource();
            windSource.buffer = noiseBuffer;
            windSource.loop = true;
            
            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'lowpass';
            windFilter.frequency.value = 600;
            
            windGain = audioCtx.createGain();
            windGain.gain.value = 0.0;
            
            windSource.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(audioCtx.destination);
            windSource.start();
        }

        function playCrashSound() {
            if (!audioCtx) return;
            // Explosion Sweep
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);

            // Explosion Noise
            const bufferSize = audioCtx.sampleRate * 1;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            noiseFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(1.5, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseSource.start();
        }

        function playCoinSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Curve target generation
        let targetCurve = 0;
        setInterval(() => {

            }
        }, 4000);

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'PLAYING' || gameState === 'DYING') {
                customUniforms.uCurve.value += (targetCurve - customUniforms.uCurve.value) * 0.02;

                let isDeadLoop = (gameState === 'DYING');

                // --- PLAYER PHYSICS ---
                if (!isDeadLoop) {
                    if (keys['KeyW']) velocity += 0.015;
                    if (keys['KeyS']) velocity -= 0.025; // Brakes

                    if (Math.abs(velocity) > 0.05) {
                        const turnRate = 0.02 * Math.sign(velocity);
                        if (keys['KeyA']) angle += turnRate;
                        if (keys['KeyD']) angle -= turnRate;
                    }

                    velocity *= 0.98; // Drag
                    angle *= 0.82;    // Steering friction
                    velocity = Math.max(-0.3, Math.min(velocity, 2.5));

                    player.rotation.y += angle * (velocity * 0.5);
                    player.translateZ(velocity);

                    playerBox.setFromObject(player);
                    playerBox.expandByScalar(-0.3);
                } else {
                    // SLOW MOTION CRASH PHYSICS
                    deathTimer += 0.01;
                    velocity *= 0.96; // Slow down gradually
                    player.translateZ(velocity * 0.2); // Move in slow motion
                    player.rotation.y += angle * 0.1; // Slowly drift
                }

                // Update Audio
                if (audioCtx && engineOsc) {
                    const speedRatio = Math.max(0, velocity / 2.5);
                    engineOsc.frequency.value = 40 + (speedRatio * 120); // Pitch
                    engineFilter.frequency.value = 100 + (speedRatio * 600); // Filter
                    windGain.gain.value = speedRatio * 0.8;
                }

                // --- TRAFFIC PHYSICS & PACING AI ---
                traffic.forEach((car, i) => {
                    const laneDiff = car.userData.targetLaneX - car.position.x;

                    if (!isDeadLoop) {
                        if (Math.abs(laneDiff) > 0.3) {
                            car.userData.angle = Math.sign(laneDiff) * 0.008;
                        } else {
                            car.userData.angle *= 0.8;
                        }
                    }

                    let dirMult = car.userData.isOncoming ? -1 : 1;

                    car.rotation.y += car.userData.angle * dirMult;
                    car.translateZ(Math.abs(car.userData.velocity) * (isDeadLoop ? 0.2 : 1)); // Slow mo traffic

                    if (!isDeadLoop) {
                        trafficBoxes[i].setFromObject(car);
                        trafficBoxes[i].expandByScalar(-0.2);
                        if (playerBox.intersectsBox(trafficBoxes[i])) triggerWasted();

                        // Respawn Logic with Pacing
                        const dist = car.position.z - player.position.z;
                        if (dist < -100 || dist > 1000) {
                            const laneList = car.userData.isOncoming ? lanesLeft : lanesRight;
                            car.userData.targetLaneX = laneList[Math.floor(Math.random() * laneList.length)];

                            let maxZ = player.position.z + 200;
                            traffic.forEach(c => {
                                if (c !== car && Math.abs(c.userData.targetLaneX - car.userData.targetLaneX) < 1) {
                                    if (c.position.z > maxZ) {
                                        maxZ = c.position.z;
                                    }
                                }
                            });

                            car.position.z = maxZ + 60 + Math.random() * 60;
                            car.position.x = car.userData.targetLaneX;
                            car.rotation.y = car.userData.isOncoming ? Math.PI : 0;
                            car.userData.angle = 0;
                            car.userData.velocity = car.userData.isOncoming ? -0.3 - Math.random() * 0.3 : 0.15 + Math.random() * 0.2;

                            const models = ['sports', 'sedan', 'truck'];
                            const colors = [0x555555, 0xaa0000, 0x0000aa, 0x228822, 0xdddddd, 0xff8800, 0x8800ff, 0x111111];
                            car.remove(car.userData.meshGroup);
                            const newMesh = createCarMesh(
                                models[Math.floor(Math.random() * models.length)],
                                colors[Math.floor(Math.random() * colors.length)]
                            );
                            car.userData.meshGroup = newMesh;
                            car.add(newMesh);
                        }
                    }
                });

                // --- COIN LOGIC ---
                coins.forEach((coin, i) => {
                    coin.rotation.z += 0.05; // Spin coin
                    
                    if (!isDeadLoop) {
                        coinBoxes[i].setFromObject(coin);
                        if (playerBox.intersectsBox(coinBoxes[i])) {
                            // Collect coin
                            coinsCount++;
                            document.getElementById('in-game-coins').innerText = coinsCount;
                            playCoinSound();
                            
                            // Move far ahead to "recycle" immediately
                            coin.position.z = player.position.z + 600 + Math.random() * 400;
                            const lanes = [-11, -4, 4, 11];
                            coin.position.x = lanes[Math.floor(Math.random() * lanes.length)];
                        }

                        // Respawn if behind
                        if (coin.position.z < player.position.z - 50) {
                            coin.position.z = player.position.z + 600 + Math.random() * 400;
                            const lanes = [-11, -4, 4, 11];
                            coin.position.x = lanes[Math.floor(Math.random() * lanes.length)];
                        }
                    }
                });

                // --- BUILDINGS RECYCLE LOGIC ---
                if (!isDeadLoop) {
                    buildings.forEach(b => {
                        if (b.position.z < player.position.z - 100) {
                            let maxZ = player.position.z + 1000;
                            b.position.z = maxZ + Math.random() * 50;

                            const isLeft = Math.random() > 0.5;
                            b.position.x = isLeft ? -28 - Math.random() * 20 : 28 + Math.random() * 20;

                            // Randomize height again and update scale of both children
                            const newHeight = 50 + Math.random() * 150;
                            b.children[0].scale.y = newHeight;
                            b.children[1].scale.y = newHeight;
                            b.position.y = newHeight / 2;
                        }
                    });
                }

                if (!isDeadLoop && Math.abs(player.position.x) > 16) triggerWasted();

                moon.position.z = player.position.z + 20;
                moon.target.position.z = player.position.z;
                moon.target.updateMatrixWorld();

                road.position.z = player.position.z;
                centerLine.position.z = player.position.z;
                leftLine.position.z = player.position.z;
                rightLine.position.z = player.position.z;

                if (!isDeadLoop) {
                    document.getElementById('score').innerText = Math.floor(player.position.z / 10);
                    document.getElementById('speed').innerText = Math.floor(Math.abs(velocity) * 80);
                }
            }

            const offset = new THREE.Vector3(0, 4.5, -9).applyQuaternion(player.quaternion);

            if (gameState === 'MENU') {
                const t = Date.now() * 0.0005;
                camera.position.set(player.position.x + Math.sin(t) * 15, 6, player.position.z + Math.cos(t) * 15);
                camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            } else if (gameState === 'PLAYING') {
                camera.position.lerp(player.position.clone().add(offset), 0.15);
                const lookDist = 20;
                const curveOffset = customUniforms.uCurve.value * lookDist * lookDist * 0.0002;

                const lookAtPos = player.position.clone().add(new THREE.Vector3(-curveOffset, 0, lookDist).applyQuaternion(player.quaternion));
                camera.lookAt(lookAtPos);
            } else if (gameState === 'DYING') {
                // Cinematic slow mo spin
                const spinRadius = 12;
                camera.position.x = crashPos.x + Math.sin(deathTimer * 1.5) * spinRadius;
                camera.position.z = crashPos.z + Math.cos(deathTimer * 1.5) * spinRadius;
                camera.position.y = 5 + Math.sin(deathTimer * 0.5) * 3;
                camera.lookAt(player.position);
            }

            if (composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        function triggerWasted() {
            if (gameState === 'DEAD' || gameState === 'DYING') return;
            gameState = 'DYING';
            crashPos.copy(player.position);

            // Save Stats
            const currentScore = Math.floor(player.position.z / 10);
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem('neon_racer_highscore', highScore);
            }
            localStorage.setItem('neon_racer_coins', coinsCount);

            wastedDiv.style.display = 'flex';
            playCrashSound();
            // slight delay to ensure display flex applies before opacity
            setTimeout(() => {
                wastedDiv.classList.add('visible');
            }, 50);
        }

        function restartGame() {
            wastedDiv.classList.remove('visible');
            setTimeout(() => {
                wastedDiv.style.display = 'none';
                mainMenu.style.display = 'flex';
                document.getElementById('menu-view-main').style.display = 'flex';
                document.getElementById('menu-view-garage').style.display = 'none';
                document.getElementById('stats-banner').style.display = 'flex';
                document.getElementById('mobile-controls').style.display = 'none';
                uiDiv.style.display = 'none';
                
                gameState = 'MENU';

                // Reset player
                player.position.set(0, 0, 0);
                player.rotation.set(0, 0, 0);
                velocity = 0;
                angle = 0;
                deathTimer = 0;
                
                // Reset traffic
                traffic.forEach((car, i) => {
                    const isOncoming = car.userData.isOncoming;
                    const laneList = isOncoming ? lanesLeft : lanesRight;
                    const targetLaneX = laneList[Math.floor(Math.random() * laneList.length)];
                    car.position.set(targetLaneX, 0, 150 + (i * 40));
                    car.userData.velocity = isOncoming ? -0.3 - Math.random() * 0.3 : 0.15 + Math.random() * 0.2;
                    car.userData.angle = 0;
                });
                
                // Reset coins
                coins.forEach((coin, i) => {
                    const lanes = [-11, -4, 4, 11];
                    coin.position.set(lanes[Math.floor(Math.random() * lanes.length)], 0.8, 200 + (i * 40));
                });
                
                // Reset buildings
                buildings.forEach((b, i) => {
                    const isLeft = Math.random() > 0.5;
                    const height = 50 + Math.random() * 150;
                    b.position.y = height / 2;
                    b.position.x = isLeft ? -28 - Math.random() * 20 : 28 + Math.random() * 20;
                    b.position.z = 100 + i * 30;
                });
                
                // Reset UI
                document.getElementById('score').innerText = '0';
                document.getElementById('speed').innerText = '0';
                document.getElementById('menu-highscore').innerText = highScore;
                document.getElementById('menu-coins').innerText = coinsCount;
            }, 500);
        }
        window.restartGame = restartGame;

        // View Switching Logic
        const openGarageBtn = document.getElementById('open-garage-btn');
        const backToMainBtn = document.getElementById('back-to-main-btn');

        if (openGarageBtn) {
            openGarageBtn.addEventListener('click', () => {
                document.getElementById('menu-view-main').style.display = 'none';
                document.getElementById('menu-view-garage').style.display = 'flex';
            });
        }

        if (backToMainBtn) {
            backToMainBtn.addEventListener('click', () => {
                document.getElementById('menu-view-garage').style.display = 'none';
                document.getElementById('menu-view-main').style.display = 'flex';
            });
        }

        animate();
    </script>
</body>

</html>
